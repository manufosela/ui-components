<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>capture-image - Demo</title>
  <style>
    body {
      margin: 0;
      padding: 2rem;
      background: #131313;
      color: #f4f5f2;
      font-family: "Inter", system-ui, sans-serif;
    }
    .container { max-width: 960px; margin: 0 auto; }
    header { margin-bottom: 3rem; }
    h1 {
      font-family: "Manrope", system-ui, sans-serif;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .subtitle { color: #b9cbc2; margin: 0.5rem 0 0.75rem; }
    .back-link { font-size: 0.85rem; color: #b9cbc2; text-decoration: none; }
    .back-link:hover { color: #00e0b3; }
    .demo-card {
      background: #1c1b1b;
      border-radius: 1rem;
      padding: 2rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: center;
    }
    .warning {
      background: rgba(0, 224, 179, 0.08);
      color: #b9cbc2;
      padding: 1rem 1.25rem;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <p><a class="back-link" href="../../../">&larr; Back to components</a></p>
      <h1>capture-image</h1>
      <p class="subtitle">Webcam capture with snap, reset and save. Requires camera permission.</p>
    </header>

    <div class="warning">
      ℹ️ This component uses <code>navigator.mediaDevices.getUserMedia</code>. Your browser will
      prompt for camera access. Served over HTTPS or localhost only.
    </div>

    <div class="demo-card">
      <capture-image size-x="480" size-y="360" mask maskpercent="20"></capture-image>
    </div>
  </div>

  <script type="module" src="../src/capture-image.js"></script>
</body>
</html>
